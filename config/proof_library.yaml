micro_stories:
  MS-01:
    type: micro_story
    title: "Email-to-Case threading fix for ELICOS provider"
    client_code: "CLIENT-ELICOS-A"
    problem: >
      Email-to-Case was regularly threading inbound replies to the wrong Case,
      resulting in the wrong agent being assigned and losing context. This slowed
      response times and created customer frustration.
    approach: >
      Implemented a deterministic case reference token (#123456#) embedded into
      outbound email subject/body. Built an EmailMessage handler to regex-scan
      inbound emails, extract the token, and reattach the conversation to the
      correct Case. Tightened assignment rules, validation, and added
      milestone-based SLA tracking.
    claimable: >
      45% reduction in case mismatches. Fewer manual reassignment touches.
      Improved first-response consistency. Reporting accuracy improved.
      Maintained 5/5 CSAT.
    anonymisation: "Remove client name; keep 'small service team'."
    date: "2025"
    tags: [education, elicos, email_to_case, sla, service_cloud]

  MS-02:
    type: micro_story
    title: "Salesforce storage cost avoidance"
    client_code: "CLIENT-ELICOS-A"
    problem: >
      Salesforce storage growth (historical records and attachments) was trending
      toward paid storage overages, creating forecasted platform cost escalation.
    approach: >
      Implemented a data retention and archiving approach: compressed historical
      datasets, separated active vs archive records, and introduced an archiving
      routine with clear retrieval rules for ops and audit needs.
    claimable: >
      Avoided storage overage charges (cost avoidance). Improved org performance.
      Cleaner separation of active vs historic data.
    anonymisation: "Do not publish cost numbers; describe as 'avoided paid storage overages'."
    date: "2025"
    tags: [education, elicos, storage, data_retention, cost_avoidance]

  MS-03:
    type: micro_story
    title: "Postgraduate programme digital enrolment"
    client_code: "CLIENT-PRIVATE-COLLEGE-A"
    problem: >
      Postgraduate programme enrolments were processed via manual PDF forms,
      creating slow turnaround, inconsistent eligibility assessment, and heavy
      admin load.
    approach: >
      Built a branded, logic-heavy online enrolment experience in Visualforce
      integrated with a headless WordPress front end. Implemented eligibility
      rules (funding, scholarships, LLN) and automated record creation
      (Contact, Opportunity, Application).
    claimable: >
      Replaced manual PDFs with an end-to-end digital enrolment workflow.
      Improved consistency of eligibility assessment. Reduced administrative
      handling and rework. Maintained 5/5 CSAT.
    anonymisation: "Reference as 'postgraduate programme enrolment' not specific degree name."
    date: "2024"
    tags: [education, private_college, enrolment, visualforce, eligibility]

  MS-04:
    type: micro_story
    title: "Salesforce-Canvas-Wisenet integration"
    client_code: "CLIENT-PRIVATE-COLLEGE-A"
    problem: >
      Student onboarding required manual re-entry into LMS and SMS, and staff
      had no unified view of progression and grades inside Salesforce.
    approach: >
      Designed bi-directional real-time integrations between Salesforce, Canvas
      LMS, and Wisenet SMS. Automated user creation and course enrolments, synced
      enrolment data and surfaced grades and progression back into Salesforce.
      Included error handling and reconciliation.
    claimable: >
      Eliminated double-entry. Reduced admin overhead significantly. Staff can
      view progression and grades without leaving Salesforce. Maintained 5/5 CSAT.
    anonymisation: "Keep system-focused; avoid student counts and specific programme identifiers."
    date: "2024"
    tags: [education, private_college, integrations, canvas, wisenet, lms]

  MS-05:
    type: micro_story
    title: "End-to-end commercial enrolment system"
    client_code: "CLIENT-PROFESSIONAL-BODY-A"
    problem: >
      Needed a complete commercial enrolment system that accepted payments,
      provisioned learning access, and provided stakeholder reporting without
      heavy manual operations.
    approach: >
      Built an end-to-end application to Stripe payment to enrolment to Canvas
      provisioning flow, plus Experience Cloud reporting for stakeholders.
      Delivered as a white-label programme managed by an education partner.
    claimable: >
      Unified application, payment, enrolment, and learning provisioning into
      one controlled workflow. Reduced manual handoffs. Improved reporting
      transparency for programme owners.
    anonymisation: "Reference as 'professional body education programme'. Avoid naming the programme."
    date: "2024"
    tags: [education, professional_body, stripe, payments, canvas, experience_cloud]

  MS-06:
    type: micro_story
    title: "Stakeholder self-service portals"
    client_code: "CLIENT-MULTI-ORG"
    problem: >
      External stakeholders needed secure self-service access to programme
      activity and reporting across many organisations, without sharing internal
      Salesforce access.
    approach: >
      Built Experience Cloud portals with role-based access, tailored dashboards,
      and operational reporting. Implemented governance for what could be seen or
