    claimable: >
      Reduced ad-hoc reporting requests. Enabled stakeholder self-service access
      to programme insights. Improved transparency through controlled reporting access.
    anonymisation: "Reference as 'multi-organisation stakeholder network'. Do not name stakeholders."
