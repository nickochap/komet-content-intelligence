patterns:
  P-01:
    type: pattern
    title: "Email-to-Case token matching"
    problem: >
      Email threads breaking and inbound replies attaching to the wrong Case,
      causing misrouting and lost context.
    approach: >
      Embed a token (e.g. #123456#) into outbound email subject/body. On inbound,
      scan with regex, extract token, match to Case, attach EmailMessage. Combine
      with assignment rules and milestones.
    claimable: >
      Prevents case misrouting. 45% reduction in case mismatches at ELICOS client.
      Reusable for any email-heavy service environment.
    anonymisation: "Pattern publishable without client reference."
    date: "2025"
    tags: [service_cloud, email_to_case, automation, pattern]

  P-02:
    type: pattern
    title: "SLA milestone and escalation framework"
    problem: >
      Inconsistent service responsiveness and no reliable way to measure or act
      on SLA breaches.
    approach: >
      Define SLA milestones tied to Case types and priority using entitlements.
      Add escalation rules and queues. Build daily operational dashboards to
      manage breaches proactively.
    claimable: >
      Consistent SLA measurement and escalation. Removes reliance on spreadsheet
      tracking.
    anonymisation: "Pattern publishable without client reference."
    date: "2025"
    tags: [service_cloud, sla, entitlements, escalation, pattern]

  P-03:
    type: pattern
    title: "Data retention and storage archiving"
    problem: >
      Platform cost escalation and performance drag from ever-growing historical
      data and attachments.
    approach: >
      Separate active vs archive data. Define retention rules. Compress and
      archive historical datasets. Automate archiving runs with monitoring and
      retrieval policy.
    claimable: >
      Avoids paid storage overages. Improves org performance. Deployed at
      ELICOS client.
    anonymisation: "Do not publish cost numbers; describe as 'avoided paid storage overages'."
    date: "2025"
    tags: [platform, storage, archiving, data_retention, pattern]

  P-04:
    type: pattern
    title: "Enrolment eligibility rules engine"
    problem: >
      Manual eligibility assessment leading to inconsistency, slow turnaround,
      and compliance risk in enrolments.
    approach: >
      Capture application inputs online. Validate in real time. Apply rule sets
      (funding, scholarships, LLN thresholds). Store decisions with audit trail.
      Route exceptions through approvals.
    claimable: >
      Consistent eligibility decisions. Audit trail for compliance. Reduced admin
      handling. Deployed at private college.
    anonymisation: "Reference as 'enrolment eligibility rules engine'."
    date: "2024"
    tags: [education, enrolment, eligibility, compliance, pattern]

  P-05:
    type: pattern
    title: "Payment-to-provisioning automation"
    problem: >
      Broken handoffs between payment completion and enrolment provisioning
      causing manual follow-up and errors.
    approach: >
      Use Stripe webhooks to confirm payment state and reconcile amounts. Trigger
      provisioning on confirmation. Include exception handling for failed or
      partial payments, chargebacks, and retries. Log each step for audit.
    claimable: >
      End-to-end payment to provisioning without manual intervention. Deployed
      at professional body education programme.
    anonymisation: "Pattern publishable without client reference."
    date: "2024"
    tags: [education, stripe, payments, provisioning, pattern]

  P-06:
    type: pattern
    title: "CRM-LMS-SMS integration pattern"
    problem: >
      Double-entry and fragmented visibility across Salesforce, LMS (Canvas),
      and SMS (Wisenet).
    approach: >
      Define system-of-record per field and object. Implement API sync with
      idempotency, retries, reconciliation, and error alerting. Push enrolments
      and provisioning outbound. Pull grades and progression inbound.
    claimable: >
      Eliminated double-entry. Staff view LMS progression inside Salesforce.
      Deployed at private college (Canvas + Wisenet).
    anonymisation: "Keep system-focused. Can name Canvas and Wisenet as systems."
    date: "2024"
    tags: [education, integrations, canvas, wisenet, api_sync, pattern]

  P-07:
    type: pattern
    title: "Stakeholder portal and self-service reporting"
    problem: >
      External stakeholders needing secure access to reporting without internal
      Salesforce licences or manual reporting cycles.
    approach: >
      Design role-based access and partner account model. Build targeted
      dashboards and reports tailored to stakeholder jobs-to-be-done. Provide
      self-service exports and scheduled reporting. Govern visibility tightly.
    claimable: >
      Reduced ad-hoc reporting requests. Enabled stakeholder self-service.
      Deployed for multi-org programme networks and finance broker.
    anonymisation: "Avoid stakeholder names. Pattern publishable."
    date: "2024"
    tags: [experience_cloud, portals, reporting, stakeholders, pattern]

  P-08:
    type: pattern
    title: "Data quality and dashboard trust"
    problem: >
      Leadership can't trust reporting numbers due to inconsistent stage
      definitions and fractured data across systems.
    approach: >
      Standardise stage definitions, required fields, and ownership first. Build
      governed metrics and dashboards. Establish review cadence and data quality
      checks. Dashboards are the last step, not the first.
    claimable: >
      Removes reporting arguments between teams. Enables confident forecasting.
      Deployed in education, programme operations, and property fund contexts.
    anonymisation: "Pattern publishable without client reference."
    date: "2024"
    tags: [cross_industry, data_quality, reporting, dashboards, pattern]

  P-09:
    type: pattern
    title: "Inherited org stabilisation playbook"
    problem: >
      Inherited Salesforce orgs with broken automation, unclear architecture,
      and low user adoption from a previous implementation.
    approach: >
      Rapid audit covering data model, security, automation, and integrations.
      Triage high-risk failures first. Introduce decision log and change control.
      Set UAT gates. Iterate improvements with bounded scope.
    claimable: >
      Restored operational reliability. Improved adoption. Deployed for multiple
      commercial clients inheriting broken implementations.
    anonymisation: "Fully anonymisable. Avoid naming previous partners."
    date: "2025"
    tags: [cross_industry, stabilisation, audit, adoption, governance, pattern]

  P-10:
    type: pattern
    title: "Guided web tools with CRM data capture"
    problem: >
      Customers need guided tools (calculators, estimators, application forms)
      with data captured for follow-up in CRM.
    approach: >
      Build LWC or embedded web tools. Validate inputs. Store structured data in
      Salesforce. Trigger follow-up workflows and surface results in portal and CRM.
    claimable: >
      Captures data that would otherwise be lost. Triggers follow-up automatically.
      Deployed at finance broker and applicable to education applications.
    anonymisation: "Pattern publishable. Avoid naming financial products."
    date: "2024"
    tags: [cross_industry, lwc, calculators, lead_capture, portal, pattern]
