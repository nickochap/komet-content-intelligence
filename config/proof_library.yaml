    tags: [education, experience_cloud, portals, reporting, stakeholders]

  MS-07:
    type: micro_story
    title: "Inherited Salesforce stabilisation"
    client_code: "CLIENT-COMMERCIAL-A"
    problem: >
      Inherited an underperforming Salesforce implementation from another partner:
      unclear ownership, inconsistent data, and low user confidence.
    approach: >
      Ran a stabilisation sprint: audit of data model, security, automations, and
      integrations. Implemented a decision log and change control. Refactored
      high-risk flows. Introduced UAT gates and release cadence.
    claimable: >
      Restored operational reliability. Improved user adoption via fewer broken
      processes. Reduced ongoing support burden. Created a maintainable baseline
      for future enhancements.
    anonymisation: "Keep client anonymous; avoid naming the previous partner."
    date: "2025"
    tags: [cross_industry, stabilisation, audit, adoption, governance]

  MS-08:
    type: micro_story
    title: "Licence optimisation and access governance"
    client_code: "CLIENT-COMMERCIAL-B"
    problem: >
      Licence allocation didn't match real usage; over-provisioning increased
      costs and complicated access control.
    approach: >
      Reviewed user roles, permissions, and actual usage patterns. Re-mapped
      profiles and permission sets to job functions. Implemented governance for
      new user provisioning and periodic access reviews.
    claimable: >
      Reduced licence waste (cost avoidance). Simplified access management.
      Improved security posture by aligning privileges to role needs.
    anonymisation: "Avoid dollar amounts; describe as 'reduced licence waste'."
    date: "2025"
    tags: [cross_industry, licences, governance, security, cost_avoidance]

  MS-09:
